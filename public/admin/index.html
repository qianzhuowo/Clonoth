<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Clonoth Studio</title>
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/nodes.css">
<link rel="stylesheet" href="css/panels.css">
<link rel="stylesheet" href="css/views.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/js-yaml@4/dist/js-yaml.min.js"></script>
</head>
<body>
<div id="app">

<!-- Login -->
<div v-if="!authed" class="lmask">
 <div class="lbox">
  <img src="logo.jpg" alt="" style="width:48px;height:48px;border-radius:10px;margin-bottom:12px">
  <h2><em>Clonoth</em> Studio</h2>
  <div class="ls">Agent Substrate 可视化编辑器</div>
  <div v-if="lerr" class="le">{{lerr}}</div>
  <input type="password" v-model="ltk" placeholder="管理 Token" @keyup.enter="login" autofocus>
  <button class="lbtn" @click="login">进入</button>
  <div class="lh">Token 在 Supervisor 启动日志中输出<br>或设置环境变量 CLONOTH_ADMIN_TOKEN</div>
 </div>
</div>

<template v-if="authed">
<!-- Sidebar -->
<div class="sidebar">
 <div class="sb-brand" style="display:flex;align-items:center;gap:10px"><img src="logo.jpg" alt="" style="width:28px;height:28px;border-radius:6px"><div><h1><em>Clonoth</em></h1><small>Studio · 可视化编辑</small></div></div>
 <ul class="sb-nav">
  <li v-for="t in navTabs" :key="t.id" :class="{on:view===t.id}" @click="goView(t.id)">{{t.icon}} {{t.label}}</li>
 </ul>
 <div class="sb-scroll">
  <template v-if="view==='canvas'">
   <div class="sb-sec">
    <div class="sb-stitle">工作流</div>
    <div v-for="w in workflows" :key="w.id" :class="['sb-wf',{on:curWfId===w.id}]" @click="selectWf(w.id)" :title="w.id">{{w.name||w.id}}</div>
    <button class="sb-add" @click="newWf">+ 新建工作流</button>
   </div>
   <div class="sb-sec">
    <div class="sb-stitle">添加节点</div>
    <div class="sb-pal">
     <button class="sb-pal-btn" @click="addNode()">⬡ 添加节点</button>
    </div>
   </div>
  </template>
 </div>
 <div class="sb-foot"><a @click="logout">退出登录</a></div>
</div>

<!-- Main -->
<div class="main">

<!-- ══ Canvas View ══ -->
<div v-if="view==='canvas'" class="cv-wrap">
 <div class="cv-bar">
  <span class="cv-bar-name">{{curWf?.name||'选择一个工作流'}}</span>
  <div class="cv-tools" v-if="curWf">
   <button @click="zoomOut">−</button>
   <span class="cv-zoom">{{zoomPct}}%</span>
   <button @click="zoomIn">+</button>
   <button @click="fitView">⊞</button>
   <button @click="delWf" class="btn-s btn-d" style="margin-left:8px">删除</button>
   <button class="cv-save" @click="saveAll">💾 保存</button>
  </div>
 </div>
 <div class="cv-vp" ref="vpRef" :class="{grabbing:isPanning}" @mousedown="cvDown" @mousemove="cvMove" @mouseup="cvUp" @mouseleave="cvUp">
  <div v-if="!curWf" class="cv-empty"><div class="cv-empty-inner">⬡<p>从左侧选择或新建一个工作流</p></div></div>
  <svg v-if="curWf" class="cv-svg">
   <defs>
    <marker id="arr-on" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto"><path d="M0 0 L10 3.5 L0 7" fill="none" stroke="#7aa2f7" stroke-width="1.2"/></marker>
    <marker id="arr-ho" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="10" markerHeight="7" orient="auto"><path d="M0 0 L10 3.5 L0 7" fill="none" stroke="#bb9af7" stroke-width="1.2"/></marker>
   </defs>
   <g :transform="`translate(${panX},${panY}) scale(${zoom})`">
    <g v-for="(c,i) in conns" :key="'e'+i">
     <template v-if="c.type==='tool'">
      <path :d="c.path" fill="none" stroke="rgba(160,216,160,.35)" stroke-width="1" stroke-dasharray="3 2"/>
     </template>
     <template v-else>
      <path :d="c.path" fill="none" :stroke="c.type==='handoff'?'#bb9af7':'#7aa2f7'" :stroke-dasharray="c.type==='handoff'?'8 4':'none'" stroke-width="2" :marker-end="c.type==='handoff'?'url(#arr-ho)':'url(#arr-on)'" opacity="0.6"/>
      <rect v-if="c.label" :x="c.lx-c.lw/2" :y="c.ly-8" :width="c.lw" height="16" rx="3" fill="#0f0f1a" opacity="0.85"/>
      <text v-if="c.label" :x="c.lx" :y="c.ly+3.5" text-anchor="middle" :fill="c.type==='handoff'?'rgba(187,154,247,.8)':'rgba(122,162,247,.8)'" font-size="9.5" font-family="Inter,sans-serif" font-weight="500">{{c.label}}</text>
     </template>
    </g>
    <line v-if="wireFrom" :x1="wireFrom.x" :y1="wireFrom.y" :x2="wireSnap?wireSnap.x:wireEndX" :y2="wireSnap?wireSnap.y:wireEndY" stroke="#7aa2f7" stroke-width="2" stroke-dasharray="6 3" opacity="0.7"/>
    <circle v-if="wireSnap" :cx="wireSnap.x" :cy="wireSnap.y" r="5" fill="var(--bg1)" stroke="#9ece6a" stroke-width="2"/>
    <g v-if="dragSnap">
     <line :x1="dragSnap.x1" :y1="dragSnap.y1" :x2="dragSnap.x2" :y2="dragSnap.y2" stroke="#9ece6a" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
     <circle :cx="dragSnap.x1" :cy="dragSnap.y1" r="5" fill="var(--bg1)" stroke="#9ece6a" stroke-width="2"/>
     <circle :cx="dragSnap.x2" :cy="dragSnap.y2" r="5" fill="var(--bg1)" stroke="#9ece6a" stroke-width="2"/>
    </g>
   </g>
  </svg>
  <div v-if="curWf" class="cv-layer" :style="{transform:`translate(${panX}px,${panY}px) scale(${zoom})`}">
   <div v-for="n in aiItems" :key="n.uid" :class="['nd',{sel:selUid===n.uid,entry:n.isEntry,dragging:dragUid===n.uid}]" :style="{left:n.x+'px',top:n.y+'px',zIndex:selUid===n.uid?10:1}" @mousedown.stop="ndDown($event,n)">
    <div class="nd-port nd-port-in" @mousedown.stop.prevent="wireStart($event,n,'in')"></div>
    <div class="nd-head">
     <span class="nd-type">{{nodeGlyph(n)}}</span>
     <span class="nd-name">{{n.name||n.id}}</span>
    </div>
    <div class="nd-id">{{n.id}}</div>
    <div class="nd-info" v-if="n.model_route">📡 {{shortRoute(n.model_route)}}</div>
    <div class="nd-terms" v-if="n.terms&&n.terms.length">
     <div class="nd-term" v-for="tm in n.terms.slice(0,3)" :key="tm.name+'-'+tm.target" :style="{color:tm.target==='$reply'?'rgba(158,206,106,.6)':'rgba(247,118,142,.5)'}">{{tm.name}} → {{tm.target}}</div>
    </div>
    <div class="nd-foot">
     <span class="nd-tools" @click.stop="openToolPicker(n)" style="cursor:pointer">🔧 {{(n.toolNames&&n.toolNames.length)||0}}</span>
     <span :class="'nd-mode nd-mode-'+n.output_mode">{{n.output_mode}}</span>
    </div>
    <div class="nd-port nd-port-out" @mousedown.stop.prevent="wireStart($event,n,'out')"></div>
   </div>
   <div v-for="t in toolItems" :key="t.uid" class="tool-chip" :style="{left:t.x+'px',top:t.y+'px'}" @mousedown.stop="toolDown($event,t)">⚙ {{shortTool(t.name)}}</div>
  </div>

  <div :class="['rpbg',{show:!!editing}]" @click="closeEd"></div>
  <div :class="['rpanel',{open:!!editing}]">
   <template v-if="editing">
    <div class="pn-head"><h3>节点属性</h3><button class="pn-x" @click="closeEd">✕</button></div>
    <div class="pn-body">
     <div class="pn-jump">
      <button class="pn-jbtn" @click="jumpEd('basic')">基本</button>
      <button class="pn-jbtn" @click="jumpEd('model')">模型</button>
      <button class="pn-jbtn" @click="jumpEd('tools')">工具</button>
      <button class="pn-jbtn" @click="jumpEd('skills')">技能</button>
      <button class="pn-jbtn" @click="jumpEd('links')">连接</button>
      <button class="pn-jbtn" @click="openRawEd(editing.id)">原始</button>
     </div>
     <div class="pn-sec" id="pn-sec-basic">
      <div class="pn-lbl">名称</div>
      <input class="pn-inp" v-model="editing.name">
      <div class="pn-lbl">节点 ID</div>
      <div class="pn-static">{{editing.id}}</div>
      <div class="pn-lbl">节点类型</div>
      <div class="pn-static">AI 节点</div>
      <div class="pn-lbl">描述</div>
      <textarea class="pn-text" v-model="editing.description"></textarea>
     </div>
     <div class="pn-sec" id="pn-sec-model">
      <div class="pn-sec-t">模型与提示词</div>
      <div class="pn-lbl">模型路由</div>
      <div class="pn-add"><input class="pn-inp" v-model="editing.model_route"><button class="btn-add" @click="jumpToRoute" title="编辑模型路由">↗</button></div>
      <div class="pn-lbl">提示词包</div>
      <div class="pn-add"><input class="pn-inp" v-model="editing.prompt_pack"><button class="btn-add" @click="jumpToPack(editing.prompt_pack)" title="编辑提示词包">↗</button></div>
      <div class="pn-lbl">Assembly</div>
      <input class="pn-inp" v-model="editing.prompt_assembly">
     </div>
     <div class="pn-sec" id="pn-sec-tools">
      <div class="pn-sec-t">工具访问</div>
      <div class="pn-lbl">模式</div>
      <select class="pn-inp" v-model="editing.tool_mode"><option value="none">none</option><option value="all">all</option><option value="allowlist">allowlist</option></select>
      <template v-if="editing.tool_mode==='allowlist'">
       <div class="pn-lbl">允许列表</div>
       <div class="pn-tags"><span class="pn-tag" v-for="(t,i) in editing.tool_allow" :key="i">{{t}} <span class="pn-tag-x" @click="editing.tool_allow.splice(i,1)">✕</span></span></div>
       <div class="pn-add"><input class="pn-inp-s" v-model="newTool" placeholder="工具名" @keyup.enter="addTool"><button class="btn-add" @click="addTool">+</button></div>
      </template>
      <template v-if="editing.tool_mode==='all'">
       <div class="pn-lbl">禁止列表</div>
       <div class="pn-tags"><span class="pn-tag" v-for="(t,i) in editing.tool_deny" :key="i">{{t}} <span class="pn-tag-x" @click="editing.tool_deny.splice(i,1)">✕</span></span></div>
       <div class="pn-add"><input class="pn-inp-s" v-model="newDeny" placeholder="工具名" @keyup.enter="addDeny"><button class="btn-add" @click="addDeny">+</button></div>
      </template>
     </div>
     <div class="pn-sec" id="pn-sec-skills">
      <div class="pn-sec-t">技能访问</div>
      <div class="pn-lbl">模式</div>
      <select class="pn-inp" v-model="editing.skill_mode"><option value="all">all</option><option value="allowlist">allowlist</option><option value="none">none</option></select>
      <template v-if="editing.skill_mode==='allowlist'">
       <div class="pn-lbl">允许列表</div>
       <div class="pn-tags"><span class="pn-tag" v-for="(s,i) in editing.skill_allow" :key="i">{{s}} <span class="pn-tag-x" @click="editing.skill_allow.splice(i,1)">✕</span></span></div>
       <div class="pn-add"><input class="pn-inp-s" placeholder="技能名" @keyup.enter="if($event.target.value.trim()){editing.skill_allow.push($event.target.value.trim());$event.target.value=''}"><button class="btn-add" @click="">+</button></div>
      </template>
     </div>
     <div class="pn-sec" id="pn-sec-output" v-if="editing.type!=='tool'">
      <div class="pn-sec-t">输出</div>
      <div class="pn-lbl">输出模式</div>
      <select class="pn-inp" v-model="editing.output_mode"><option value="draft">draft</option><option value="reply">reply</option></select>
     </div>
     <div class="pn-sec" id="pn-sec-links">
      <div class="pn-sec-t">连接 (工作流级)</div>
      <div class="pn-lbl">On 事件</div>
      <div class="pn-conn" v-for="(target,outcome) in editing.on" :key="'on-'+outcome">
       <span class="pn-conn-k">{{outcome}}</span><span class="arr">→</span>
       <select class="pn-inp-s" :value="target" @change="editing.on[outcome]=$event.target.value">
        <option value="$reply">$reply</option>
        <option value="$end">$end</option>
        <option v-for="n in otherNodes" :key="n.id" :value="n.id">{{n.name||n.id}}</option>
       </select>
       <button class="pn-conn-x" @click="delete editing.on[outcome]">✕</button>
      </div>
      <div class="pn-add"><input class="pn-inp-s" v-model="newOnK" placeholder="outcome" @keyup.enter="addOn" style="max-width:80px"><select class="pn-inp-s" v-model="newOnV"><option value="">目标...</option><option value="$reply">$reply</option><option value="$end">$end</option><option v-for="n in otherNodes" :key="n.id" :value="n.id">{{n.name||n.id}}</option></select><button class="btn-add" @click="addOn">+</button></div>
      <div class="pn-lbl" style="margin-top:10px">Handoffs</div>
      <div class="pn-conn" v-for="(target,outcome) in editing.handoffs" :key="'ho-'+outcome">
       <span class="pn-conn-k">{{outcome}}</span><span class="arr">→</span>
       <select class="pn-inp-s" :value="target" @change="editing.handoffs[outcome]=$event.target.value">
        <option v-for="n in otherNodes" :key="n.id" :value="n.id">{{n.name||n.id}}</option>
       </select>
       <button class="pn-conn-x" @click="delete editing.handoffs[outcome]">✕</button>
      </div>
      <div class="pn-add"><input class="pn-inp-s" v-model="newHoK" placeholder="outcome" @keyup.enter="addHo" style="max-width:80px"><select class="pn-inp-s" v-model="newHoV"><option value="">目标...</option><option v-for="n in otherNodes" :key="n.id" :value="n.id">{{n.name||n.id}}</option></select><button class="btn-add" @click="addHo">+</button></div>
     </div>
    </div>
    <div class="pn-actions">
     <label class="pn-check"><input type="checkbox" :checked="editing.isEntry" @change="setEntry($event.target.checked)"> 设为入口节点</label>
     <div class="pn-btns">
      <button class="btn btn-s" @click="openRawEd(editing.id)">原始编辑</button>
      <button class="btn btn-d btn-s" @click="delNode">删除节点</button>
      <button class="btn btn-p btn-s" @click="saveNode">保存节点</button>
     </div>
    </div>
   </template>
  </div>

  <div v-if="connModal" class="conn-modal-mask" @click.self="connModal=null">
   <div class="conn-modal">
    <h4>创建连接</h4>
    <div class="conn-info">{{connModal.fromId}} → {{connModal.toId}}</div>
    <div class="conn-row">
     <label>连接类型</label>
     <select class="pn-inp" v-model="connModal.type"><option value="on">on（流转）</option><option value="handoff">handoff（委托）</option></select>
    </div>
    <div class="conn-row">
     <label>Outcome</label>
     <div class="conn-presets">
      <button v-for="p in ['completed','failed','reply','handoff']" :key="p" :class="['conn-pre',{on:connModal.outcome===p}]" @click="connModal.outcome=p">{{p}}</button>
     </div>
     <input class="pn-inp" v-model="connModal.outcome" placeholder="选择预设或输入自定义名称" style="margin-top:6px">
    </div>
    <div class="conn-btns">
     <button class="btn btn-s" @click="connModal=null">取消</button>
     <button class="btn btn-p btn-s" @click="confirmConn">确定</button>
    </div>
   </div>
  </div>
  <div v-if="toolPicker" class="conn-modal-mask" @click.self="toolPicker=null">
   <div class="tool-picker">
    <div class="tp-head">
     <h4>🔧 工具配置</h4>
     <span class="tp-nid">{{toolPicker.nodeId}}</span>
    </div>
    <div class="tp-mode">
     <label>访问模式</label>
     <select class="pn-inp" v-model="toolPicker.mode" @change="tpModeChange">
      <option value="none">none — 禁用所有工具</option>
      <option value="all">all — 启用所有工具</option>
      <option value="allowlist">allowlist — 仅启用勾选的</option>
     </select>
    </div>
    <div class="tp-list" v-if="toolPicker.mode!=='none'">
     <div class="tp-sub" v-if="toolPicker.mode==='all'">取消勾选以禁用特定工具</div>
     <div class="tp-sub" v-else>勾选以启用特定工具</div>
     <label class="tp-item" v-for="t in allToolNames" :key="t"><input type="checkbox" :checked="tpChecked(t)" @change="tpToggle(t,$event.target.checked)">{{t}}</label>
    </div>
    <div class="tp-foot">
     <button class="btn btn-s" @click="toolPicker=null">取消</button>
     <button class="btn btn-p btn-s" @click="saveToolPicker">保存</button>
    </div>
   </div>
  </div>
  <div v-if="rawEd" class="raw-mask">
   <div class="raw-box">
    <div class="raw-head">
     <div>
      <h3>{{rawEd.nodeId}}</h3>
      <div class="raw-sub">完整原始编辑。左侧是节点定义。右侧是当前工作流中的节点片段。</div>
     </div>
     <button class="pn-x" @click="closeRawEd">✕</button>
    </div>
    <div class="raw-body">
      <div class="raw-pane">
       <h4>节点定义 YAML</h4>
       <textarea class="raw-ta" v-model="rawEd.nodeContent" spellcheck="false"></textarea>
       <div class="raw-help">这里可以编辑全部字段。包括 description、skills、任意扩展字段。</div>
      </div>
      <div class="raw-pane">
       <h4>工作流节点片段 YAML</h4>
       <textarea class="raw-ta" v-model="rawEd.flowContent" spellcheck="false"></textarea>
       <div class="raw-help">这里编辑当前工作流中这个节点的 on、handoffs 等字段。</div>
      </div>
    </div>
    <div class="raw-foot">
     <label class="pn-check"><input type="checkbox" v-model="rawEd.isEntry"> 设为入口节点</label>
     <div class="pn-btns">
      <button class="btn btn-s" @click="closeRawEd">取消</button>
      <button class="btn btn-p btn-s" @click="saveRawEd">保存原始内容</button>
     </div>
    </div>
   </div>
  </div>
 </div>
</div>

<!-- ══ Dashboard ══ -->
<div v-if="view==='dash'" class="view-pane">
 <div class="vp-head"><h2>概览</h2><button class="btn btn-d btn-s" @click="restart">重启引擎</button></div>
 <div class="stat-grid">
  <div class="stat-card"><div class="sl">状态</div><div class="sv" style="color:var(--blue)">{{health?.status||'—'}}</div><div style="font-size:.7rem;color:var(--sub)">{{health?fmtUp(health.uptime_seconds):''}}</div></div>
  <div class="stat-card"><div class="sl">会话</div><div class="sv">{{adm?.sessions??'��'}}</div></div>
  <div class="stat-card"><div class="sl">待审批</div><div class="sv" style="color:var(--amber)">{{adm?.approvals?.pending??0}}</div></div>
  <div class="stat-card"><div class="sl">运行中</div><div class="sv" style="color:var(--green)">{{adm?.tasks?.running??0}}</div></div>
 </div>
 <div class="card"><div class="ch"><h3>模型配置</h3></div>
  <table v-if="appCfg"><tbody>
   <tr><td style="width:120px;color:var(--sub)">Provider</td><td>{{appCfg.provider}}</td></tr>
   <tr><td style="color:var(--sub)">Base URL</td><td>{{appCfg.openai?.base_url}}</td></tr>
   <tr><td style="color:var(--sub)">Model</td><td>{{appCfg.openai?.model}}</td></tr>
  </tbody></table>
 </div>
</div>

<!-- ══ Prompts ══ -->
<div v-if="view==='prompts'" class="view-pane">
 <div v-if="!ed">
  <div class="vp-head"><h2>提示词包</h2></div>
  <div class="cg"><div class="card" v-for="p in packs" :key="p.id">
   <div class="ch"><h3>{{p.name}}</h3><span class="b b-ai">{{p.id}}</span></div>
   <p style="font-size:.75rem;color:var(--sub);margin-bottom:10px">{{p.description}}</p>
   <div class="bg"><button class="btn btn-s" @click="pMani(p.id)">Manifest</button><button class="btn btn-s" @click="pFList(p.id)">Fragments</button></div>
  </div></div>
 </div>
 <div v-else-if="ed.type==='flist'">
  <div class="et mb12"><div class="fx"><button class="btn btn-s" @click="ed=null">← 返回</button><h2>{{ed.pid}} / fragments</h2></div><button class="btn btn-p btn-s" @click="pFNew(ed.pid)">+ 新建</button></div>
  <div class="card" style="padding:0;overflow:hidden"><div class="fi" v-for="f in ed.fs" :key="f" @click="pFEd(ed.pid,f)">{{f}}</div>
   <div v-if="!ed.fs.length" style="padding:16px;text-align:center;color:var(--sub)">暂无</div></div>
 </div>
 <div v-else class="ew">
  <div class="et"><div class="fx"><button class="btn btn-s" @click="pBack">← 返回</button><h2>{{pTitle()}}</h2></div>
   <div class="bg"><button v-if="ed.type==='frag'&&!ed.isNew" class="btn btn-d btn-s" @click="pFDel(ed.pid,ed.fp)">删除</button><button class="btn btn-p btn-s" @click="pSave">保存</button></div></div>
  <div class="field" v-if="ed.type==='frag'&&ed.isNew"><label>片段路径</label><input v-model="ed.fp"></div>
  <textarea class="ce" v-model="ed.content" spellcheck="false"></textarea>
 </div>
</div>

<!-- ══ Config ══ -->
<div v-if="view==='config'" class="view-pane">
 <div class="vp-head"><h2>配置</h2></div>
 <div class="tabs"><div v-for="c in cfgTabs" :key="c.k" :class="['tab',{on:csub===c.k}]" @click="cfgLd(c.a,c.k)">{{c.l}}</div></div>
 <div v-if="ed&&ed.type==='cfg'" class="ew">
  <div class="et"><h2>{{cfgLbl}}</h2><button class="btn btn-p btn-s" @click="cfgSv">保存</button></div>
  <textarea class="ce" v-model="ed.content" spellcheck="false"></textarea>
 </div>
</div>

<!-- ══ Tools & MCP ══ -->
<div v-if="view==='tools'" class="view-pane">
 <div v-if="!toolEd&&!mcpEd">
  <div class="vp-head"><h2>自定义工具</h2><div class="bg"><button class="btn btn-s" @click="reloadTools" :disabled="reloading">{{reloading?'重载中…':'🔄 重载工具'}}</button><button class="btn btn-p btn-s" @click="newToolEd">+ 新建工具</button></div></div>
  <div v-if="!toolsList.length" style="color:var(--sub);font-size:.8rem">暂无自定义工具</div>
  <div class="cg">
   <div class="card" v-for="t in toolsList" :key="t.name">
    <div class="ch"><h3>{{t.name}}</h3><span class="b b-ai">{{t.file}}</span></div>
    <p style="font-size:.75rem;color:var(--sub);margin-bottom:8px">{{t.description||'无描述'}}</p>
    <div class="bg"><button class="btn btn-s" @click="openToolEd(t.name)">编辑</button><button class="btn btn-d btn-s" @click="delTool(t.name)">删除</button></div>
   </div>
  </div>
  <div style="margin-top:24px">
   <div class="vp-head"><h2>MCP Clients</h2><button class="btn btn-s" @click="openMcpEd">编辑 YAML</button></div>
   <div v-if="!mcpList.length" style="color:var(--sub);font-size:.8rem">暂无 MCP 配置</div>
   <div class="cg">
    <div class="card" v-for="m in mcpList" :key="m.id">
     <div class="ch"><h3>{{m.id}}</h3><span class="b" style="background:rgba(115,218,202,.1);color:var(--teal)">{{m.transport||'stdio'}}</span></div>
     <p style="font-size:.72rem;color:var(--sub)">{{m.command||m.url||''}}</p>
    </div>
   </div>
  </div>
 </div>
 <div v-else-if="toolEd" class="ew">
  <div class="et"><div class="fx"><button class="btn btn-s" @click="toolEd=null">← 返回</button><h2>{{toolEd.isNew?'新建工具':toolEd.name}}</h2></div>
   <div class="bg"><button v-if="!toolEd.isNew" class="btn btn-d btn-s" @click="delTool(toolEd.name)">删除</button><button class="btn btn-p btn-s" @click="saveToolEd">保存</button></div></div>
  <textarea class="ce" v-model="toolEd.content" spellcheck="false"></textarea>
 </div>
 <div v-else-if="mcpEd" class="ew">
  <div class="et"><div class="fx"><button class="btn btn-s" @click="mcpEd=null">← 返回</button><h2>MCP Clients YAML</h2></div>
   <button class="btn btn-p btn-s" @click="saveMcpEd">保存</button></div>
  <textarea class="ce" v-model="mcpEd.content" spellcheck="false"></textarea>
 </div>
</div>

<!-- ══ Skills ══ -->
<div v-if="view==='skills'" class="view-pane">
 <div v-if="!skillEd">
  <div class="vp-head"><h2>技能管理</h2><button class="btn btn-p btn-s" @click="newSkillEd">+ 新建技能</button></div>
  <div v-if="!skillsList.length" style="color:var(--sub);font-size:.8rem">暂无技能</div>
  <div class="cg">
   <div class="card" v-for="s in skillsList" :key="s.name">
    <div class="ch"><h3>{{s.name}}</h3><span class="b" :style="{background:s.enabled?'rgba(158,206,106,.1)':'rgba(247,118,142,.1)',color:s.enabled?'var(--green)':'var(--red)'}">{{s.enabled?'启用':'禁用'}}</span></div>
    <p style="font-size:.75rem;color:var(--sub);margin-bottom:4px">{{s.description||'无描述'}}</p>
    <div v-if="s.keywords&&s.keywords.length" style="margin-bottom:6px"><span class="pn-tag" v-for="k in s.keywords" :key="k" style="margin-right:4px">{{k}}</span></div>
    <div class="bg"><button class="btn btn-s" @click="openSkillEd(s.name)">编辑</button><button class="btn btn-d btn-s" @click="delSkill(s.name)">删除</button></div>
   </div>
  </div>
 </div>
 <div v-else class="ew">
  <div class="et"><div class="fx"><button class="btn btn-s" @click="skillEd=null">← 返回</button><h2>{{skillEd.isNew?'新建技能':skillEd.name}}</h2></div>
   <div class="bg"><button v-if="!skillEd.isNew" class="btn btn-d btn-s" @click="delSkill(skillEd.name)">删除</button><button class="btn btn-p btn-s" @click="saveSkillEd">保存</button></div></div>
  <textarea class="ce" v-model="skillEd.content" spellcheck="false"></textarea>
 </div>
</div>

</div>
</template>
<div :class="['toast',ttyp,{show:tshow}]">{{tmsg}}</div>
</div>

<script src="js/app.js"></script>
</body>
</html>
