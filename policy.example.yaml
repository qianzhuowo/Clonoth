# Clonoth policy configuration
# Copy to data/policy.yaml to override defaults.
#
# 命令安全采用双层机制：
# 1. cmd_reviewer 节点做 AI 前置审核。
# 2. Supervisor 继续做人类审批与硬规则兜底。
#
# AI 审核不能替代人类审批。

version: 1

extra_roots: []

read_file:
  default: auto
  rules:
    - pattern: ".env"
      decision: deny
      reason: "do not allow reading dotenv secrets"
    - pattern: "**/.env"
      decision: deny
      reason: "do not allow reading dotenv secrets"

write_file:
  default: auto
  rules:
    - pattern: "tools/**"
      decision: approval_required
      reason: "creating/updating tools requires approval"
    - pattern: "config/runtime.yaml"
      decision: auto
      reason: "runtime tuning config"
    - pattern: "config/model_routing.yaml"
      decision: approval_required
      reason: "model routing changes affect node behavior"
    - pattern: "config/nodes/**"
      decision: approval_required
      reason: "node definition changes affect execution"
    - pattern: "config/workflows/**"
      decision: approval_required
      reason: "workflow changes affect node graph"
    - pattern: "config/prompt_packs/**"
      decision: approval_required
      reason: "prompt pack changes require approval"
    - pattern: "data/config.yaml"
      decision: approval_required
      reason: "config changes require approval"
    - pattern: "data/policy.yaml"
      decision: deny
      reason: "policy is high-risk (human-only)"
    - pattern: "data/events.jsonl"
      decision: deny
      reason: "event log is append-only; never modify"
    - pattern: "data/schedules.yaml"
      decision: approval_required
      reason: "schedule changes require approval"
    - pattern: "engine/**"
      decision: approval_required
      reason: "engine source changes require approval"
    - pattern: "supervisor/**"
      decision: approval_required
      reason: "supervisor source changes require approval"
    - pattern: "toolbox/**"
      decision: approval_required
      reason: "toolbox source changes require approval"
    - pattern: "providers/**"
      decision: approval_required
      reason: "provider source changes require approval"
    - pattern: "shell/**"
      decision: approval_required
      reason: "shell source changes require approval"
    - pattern: "clonoth_runtime.py"
      decision: approval_required
      reason: "runtime lib changes require approval"
    - pattern: "main.py"
      decision: approval_required
      reason: "entrypoint changes require approval"
    - pattern: ".env"
      decision: deny
      reason: "do not allow writing dotenv secrets"
    - pattern: "**/.env"
      decision: deny
      reason: "do not allow writing dotenv secrets"

# 命令执行策略。
# default=approval_required：AI 审核之后，仍需人类审批。
# deny_patterns：仅拦截明确不可逆的破坏命令，作为最后防线。
execute_command:
  default: approval_required
  deny_patterns:
    - "\\brm\\s+-rf\\s+/"
    - "\\brm\\s+-rf\\s+~"
    - "\\brm\\s+-rf\\s+\\*"
    - "\\bformat\\b"
    - "\\bmkfs\\b"
    - "\\bfdisk\\b"
    - "\\bdd\\s+if=/dev/zero\\b"
    - "\\bshutdown\\b"
    - "\\breboot\\b"

restart:
  default: approval_required
